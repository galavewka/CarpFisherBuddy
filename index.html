<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GPS & Compass Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Overlay UI */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:active { background-color: #0056b3; }
        
        /* Custom Marker CSS */
        .user-marker-container {
            width: 24px;
            height: 24px;
            position: relative;
            /* Smooth rotation transition */
            transition: transform 0.1s linear; 
        }
        /* The blue GPS circle */
        .gps-circle {
            width: 20px;
            height: 20px;
            background-color: #007bff;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }
        /* The red compass heading line */
        .heading-line {
            width: 4px;
            height: 50px;
            background-color: red;
            position: absolute;
            bottom: 12px; /* Start from center of circle */
            left: 10px;   /* Center horizontally */
            transform-origin: bottom center;
            z-index: 1;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>Compass & GPS Map</h2>
        <p>This app requires access to your location and device orientation. iOS users must tap the button below to grant permission.</p>
        <button id="start-btn">Start Tracking</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialize Map
        const map = L.map('map').setView([0, 0], 2); // Default view before GPS
        
        // Load OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let userMarker = null;
        let headingElement = null;
        let isTracking = false;

        // Custom HTML Icon for Leaflet
        const userIcon = L.divIcon({
            className: 'custom-user-icon',
            html: `
                <div class="user-marker-container" id="marker-rotation-wrapper">
                    <div class="heading-line"></div>
                    <div class="gps-circle"></div>
                </div>
            `,
            iconSize: [24, 24],
            iconAnchor: [12, 12] // Center the icon exactly on the GPS coordinate
        });

        // 2. Main Start Function
        document.getElementById('start-btn').addEventListener('click', async () => {
            // Request Device Orientation Permission (specifically for iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission !== 'granted') {
                        alert('Compass permission denied.');
                        return;
                    }
                } catch (error) {
                    console.error('Permission error:', error);
                }
            }

            // Hide start screen
            document.getElementById('start-screen').style.display = 'none';
            
            startGPS();
            startCompass();
        });

        // 3. GPS Tracking
        function startGPS() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;

                        if (!userMarker) {
                            // First time getting location: create marker and zoom in
                            userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);
                            map.setView([lat, lng], 18);
                            // Grab the DOM element for rotation after it's added to map
                            headingElement = document.getElementById('marker-rotation-wrapper');
                        } else {
                            // Update existing marker position
                            userMarker.setLatLng([lat, lng]);
                        }
                    },
                    (error) => {
                        alert("Error getting location: " + error.message);
                    },
                    {
                        enableHighAccuracy: true,
                        maximumAge: 0,
                        timeout: 5000
                    }
                );
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }

        // 4. Compass Tracking (Handling iOS vs Android)
        function startCompass() {
            // Standard Android devices usually provide Earth-coordinate heading via 'deviceorientationabsolute'
            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', handleOrientation);
            } 
            // Fallback for iOS and other browsers
            else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleOrientation(event) {
            if (!headingElement) return;

            let heading = 0;

            // iOS absolute compass heading
            if (event.webkitCompassHeading) {
                heading = event.webkitCompassHeading;
            } 
            // Android absolute compass heading
            else if (event.alpha !== null) {
                // event.alpha usually represents Z-axis rotation. 
                // To convert standard alpha to compass heading:
                heading = 360 - event.alpha; 
            }

            // Apply rotation to the wrapper element using CSS
            headingElement.style.transform = `rotate(${heading}deg)`;
        }
    </script>
</body>
</html>
