<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CarpFisher IQ - Elite Edition</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<style>
:root {
    --bg-main: #060913;
    --bg-surface: rgba(15, 23, 42, 0.75);
    --bg-card: rgba(30, 41, 59, 0.7);
    --accent-blue: #38bdf8;
    --accent-green: #34d399;
    --accent-orange: #fb923c;
    --accent-red: #f87171;
    --accent-purple: #c084fc;
    --text-main: #f8fafc;
    --text-muted: #64748b;
    --border-color: rgba(255, 255, 255, 0.12);
    --glow-blue: rgba(56, 189, 248, 0.25);
    --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
}

body {
    margin: 0;
    font-family: var(--font-stack);
    background: var(--bg-main);
    color: var(--text-main);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
}

/* Hard-coded absolute sizing to force the map layout to fill the background */
#map {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
}

/* Luxury Glass HUD Header Overlay */
header {
    position: absolute;
    top: max(16px, env(safe-area-inset-top));
    left: 16px;
    right: 16px;
    z-index: 1000;
    background: var(--bg-surface);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--border-color);
    padding: 14px 20px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

header .logo-group {
    display: flex;
    align-items: center;
    gap: 8px;
}

header h1 {
    margin: 0;
    font-weight: 900;
    font-size: 1.15rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--accent-blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

header .pulse-radar {
    width: 8px;
    height: 8px;
    background: var(--accent-blue);
    border-radius: 50%;
    box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7);
    animation: radarPulse 2s infinite;
}

@keyframes radarPulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
}

header .top-actions {
    display: flex;
    gap: 10px;
}

/* Premium Haptic Formatted Micro-Buttons */
button {
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.08);
    color: var(--text-main);
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    padding: 10px 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

button:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.2);
}

button:active {
    transform: scale(0.94);
}

button.primary {
    background: linear-gradient(135deg, #0072ff 0%, var(--accent-blue) 100%);
    box-shadow: 0 4px 14px var(--glow-blue);
    border: none;
}

button.success {
    background: linear-gradient(135deg, #059669 0%, var(--accent-green) 100%);
    border: none;
}

button.danger {
    background: linear-gradient(135deg, #dc2626 0%, var(--accent-red) 100%);
    border: none;
}

/* Base structural panel layer covering the lower viewport area */
.dashboard-sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 1001;
    background: transparent; 
    padding: 0 20px 0 20px;
    height: 50vh;
    display: flex;
    flex-direction: column;
    
    /* Touch skip allowed on outer baseline container level */
    pointer-events: none; 
}

/* Minimalist drag handle */
.dashboard-sheet::before {
    content: '';
    display: block;
    width: 40px;
    height: 4px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 2px;
    margin: 10px auto 14px auto;
    flex-shrink: 0;
}

/* NATIVE TOUCH-SCROLLABLE CONTAINER WRAPPER FOR PHONES */
.scroll-container {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch; /* Forces hardware acceleration on iOS/Android */
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    
    /* Explicitly tells the phone OS that touches here are interactive */
    pointer-events: auto; 
}

/* High-Gloss Cards System Architecture */
.card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border-radius: 20px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
}

.card h3 {
    margin: 0 0 14px 0;
    font-size: 0.85rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
}

/* Metrics Dashboard Grid Layout */
.metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}

.metric-box {
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid var(--border-color);
    padding: 12px;
    border-radius: 14px;
    text-align: center;
    transition: transform 0.3s ease;
}

.metric-box:hover {
    transform: translateY(-2px);
}

.metric-val {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--text-main);
    font-variant-numeric: tabular-nums;
}

.metric-lbl {
    font-size: 0.65rem;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-top: 4px;
}

.action-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

/* Unified Glassmorphic Layer Modals System */
.modal {
    position: fixed;
    inset: 0;
    z-index: 50000;
    background: rgba(3, 5, 11, 0.4);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), backdrop-filter 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.modal.open {
    opacity: 1;
    pointer-events: auto;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}

.box {
    background: rgba(15, 23, 42, 0.85);
    border: 1px solid var(--border-color);
    padding: 28px;
    border-radius: 24px;
    width: 90%;
    max-width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    transform: scale(0.9) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.modal.open .box {
    transform: scale(1) translateY(0);
}

.box h3 {
    margin: 0 0 16px 0;
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: 0.5px;
}

input, select {
    width: 100%;
    padding: 14px;
    margin-bottom: 16px;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.3);
    color: var(--text-main);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    font-size: 0.95rem;
    transition: all 0.3s ease;
}

input:focus, select:focus {
    outline: none;
    border-color: var(--accent-blue);
    background: rgba(0, 0, 0, 0.5);
    box-shadow: 0 0 12px rgba(56, 189, 248, 0.15);
}

/* Premium Precision Positioning Module HUD overlay */
#placeMode {
    position: fixed;
    inset: 0;
    z-index: 10000;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.32, 0.94, 0.6, 1);
}

#placeMode.open {
    transform: translateY(0);
}

#placeMap { width: 100vw; height: 100vh; position: absolute; }

/* MINIMALIST PREMIUM CROSSHAIR FRAMEWORK & ANIMATION */
.crosshair-container {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 40px;
    pointer-events: none;
    z-index: 10002;
    display: flex;
    align-items: center;
    justify-content: center;
}

.crosshair-dot {
    width: 4px;
    height: 4px;
    background-color: var(--accent-orange);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--accent-orange);
}

.crosshair-line {
    position: absolute;
    background-color: rgba(251, 146, 60, 0.6);
}

.crosshair-line.horizontal {
    width: 24px;
    height: 1.5px;
    animation: crossHairPulseHoriz 1.8s ease-in-out infinite alternate;
}

.crosshair-line.vertical {
    width: 1.5px;
    height: 24px;
    animation: crossHairPulseVert 1.8s ease-in-out infinite alternate;
}

@keyframes crossHairPulseHoriz {
    0% { width: 16px; opacity: 0.5; }
    100% { width: 28px; opacity: 1; filter: drop-shadow(0 0 3px var(--accent-orange)); }
}

@keyframes crossHairPulseVert {
    0% { height: 16px; opacity: 0.5; }
    100% { height: 28px; opacity: 1; filter: drop-shadow(0 0 3px var(--accent-orange)); }
}

#hud {
    position: absolute;
    top: max(20px, env(safe-area-inset-top)); left: 16px; right: 16px;
    background: var(--bg-surface);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 14px;
    z-index: 10003;
    border-radius: 16px;
    border: 1px solid rgba(251, 146, 60, 0.3);
    text-align: center;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.5px;
}

#placeBtns {
    position: absolute;
    bottom: max(24px, env(safe-area-inset-bottom)); left: 16px; right: 16px;
    display: flex; gap: 12px; z-index: 10003;
}

/* History Badges & Output Styling */
.fish-badge {
    background: rgba(0, 0, 0, 0.2);
    padding: 14px;
    border-radius: 12px;
    margin-top: 10px;
    border-left: 4px solid var(--accent-blue);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.fish-info b { font-size: 1rem; color: #fff; }
.fish-info span { display: block; font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

.remove-btn {
    background: transparent;
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: var(--accent-red);
    padding: 6px 12px;
    font-size: 0.7rem;
    border-radius: 8px;
    text-transform: uppercase;
}
.remove-btn:hover { background: rgba(248, 113, 113, 0.15); }

.preview-btn {
    width: 100%;
    margin-top: 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
}
.preview-btn.active {
    background: rgba(251, 146, 60, 0.15);
    border-color: var(--accent-orange);
    color: var(--accent-orange);
}

/* Leaflet Theming Maps Adjustments Override */
.leaflet-control-layers {
    background: var(--bg-surface) !important;
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-color) !important;
    border-radius: 12px !important;
    color: var(--text-main) !important;
}
.leaflet-bar { border: 1px solid var(--border-color) !important; box-shadow: none !important; }
.leaflet-bar a { background-color: var(--bg-surface) !important; color: #fff !important; border-bottom: 1px solid var(--border-color) !important; }
</style>
</head>
<body>

<header>
    <div class="logo-group">
        <div class="pulse-radar"></div>
        <h1>CarpFisher IQ</h1>
    </div>
    <div class="top-actions">
        <button onclick="beginSpot()">📍 Add Swim</button>
        <button class="success" onclick="openSession()">🎣 Session</button>
    </div>
</header>

<div id="map"></div>

<div class="dashboard-sheet" id="panelDashboard">
    <div class="scroll-container">
        <div id="active"></div>
        <div class="card">
            <h3>System Telemetry Archives</h3>
            <div id="history"></div>
        </div>
    </div>
</div>

<div class="modal" id="sessionModal"><div class="box">
    <h3>Initialize Session</h3>
    <input id="sessionName" placeholder="Session Identifier Name">
    <select id="spotSelect"></select>
    <button class="success" onclick="createSession()" style="width:100%;">Deploy Module</button>
    <button class="secondary" onclick="closeModal('sessionModal')" style="width:100%; margin-top:8px;">Abort</button>
</div></div>

<div class="modal" id="fishModal"><div class="box">
    <h3>Log Specimen Catch</h3>
    <input id="species" placeholder="Fish Species">
    <input id="weight" placeholder="Weight (kg)" type="number" step="0.01">
    <input id="length" placeholder="Length (cm)" type="number">
    <input id="bait" placeholder="Rig / Tactical Bait Matrix">
    <button class="primary" onclick="saveFish()" style="width:100%;">Record Entry</button>
    <button class="secondary" onclick="closeModal('fishModal')" style="width:100%; margin-top:8px;">Cancel</button>
</div></div>

<div class="modal" id="textModal"><div class="box">
    <h3 id="textTitle">Metadata Matrix Prompt</h3>
    <input id="textInput">
    <button class="primary" onclick="finishPlacement()" style="width:100%;">Save Mapping Array</button>
    <button class="secondary" onclick="closeModal('textModal')" style="width:100%; margin-top:8px;">Cancel</button>
</div></div>

<div class="modal" id="confirmEndModal"><div class="box" style="border-color: var(--accent-red);">
    <h3>Terminate Active Stream?</h3>
    <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px;">
        Are you completely sure you want to stop active location monitoring and store metrics to static historical architecture?
    </p>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <button class="secondary" onclick="closeModal('confirmEndModal')">NO</button>
        <button class="danger" onclick="confirmEndSession()">YES</button>
    </div>
</div></div>

<div id="placeMode">
    <div id="placeMap"></div>
    <div class="crosshair-container">
        <div class="crosshair-line horizontal"></div>
        <div class="crosshair-line vertical"></div>
        <div class="crosshair-dot"></div>
    </div>
    <div id="hud"><span id="hudText">Calibrating Positioning Radar Matrix...</span></div>
    <div id="placeBtns">
        <button class="danger" onclick="cancelPlace()" style="flex:1;">Cancel Array</button>
        <button class="success" onclick="acceptPlace()" style="flex:1;">Lock Coordinates</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let db=JSON.parse(localStorage.getItem("fishbuddy_rebuild")||'{"spots":[],"sessions":[]}');
const persist=()=>localStorage.setItem("fishbuddy_rebuild",JSON.stringify(db));

const streetTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
const satTiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });

const map=L.map('map', { layers: [streetTiles], zoomControl: false }).setView([50.45,30.52],12);
L.control.layers({ "Tactical Grid": streetTiles, "Satellite Array": satTiles }, null, { position: 'topright' }).addTo(map);

let me=null, placeMap=null, myPos=null, previewSessionId=null;

navigator.geolocation.watchPosition(p=>{
 myPos=[p.coords.latitude,p.coords.longitude];
 const icon=L.divIcon({html:"<div style='background:var(--accent-blue); width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 10px var(--accent-blue);'></div>", className:""});
 
 if(!me){ me=L.marker(myPos,{icon}).addTo(map); map.setView(myPos,16); }
 else me.setLatLng(myPos);

 redraw();
}, err=>console.log("GPS Array offline."), {enableHighAccuracy: true});

function activeSession(){ return db.sessions.find(x=>x.status==="active"); }
function getCalculatedAnchor(sess) {
   if (sess && sess.customBase) return [sess.customBase.lat, sess.customBase.lng];
   return myPos;
}

function showModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

let layers=[];
let placeLayers=[];

function redraw(){
 layers.forEach(x=>map.removeLayer(x)); layers=[];
 placeLayers.forEach(x=>{ if(placeMap) placeMap.removeLayer(x); }); placeLayers=[];

 const drawToBoth = (element) => {
    layers.push(element.addTo(map));
    if(placeMap) {
       let clone;
       if(element instanceof L.Marker) {
          clone = L.marker(element.getLatLng(), {icon: element.options.icon});
          if(element.getPopup()) clone.bindPopup(element.getPopup().getContent());
       } else if(element instanceof L.CircleMarker) {
          clone = L.circleMarker(element.getLatLng(), element.options);
          if(element.getPopup()) clone.bindPopup(element.getPopup().getContent());
       } else if(element instanceof L.Polyline) {
          clone = L.polyline(element.getLatLngs(), element.options);
       }
       if(clone) placeLayers.push(clone.addTo(placeMap));
    }
 };

 db.spots.forEach(s=>{
    drawToBoth(L.marker([s.lat,s.lng], {icon: L.divIcon({html:"📌", className:"", iconAnchor:[12,12]})}).bindPopup("<b>📍 Swims Tracker:</b> "+s.name));
 });

 db.sessions.forEach(sess=>{
    if(sess.status !== "active" && sess.id !== previewSessionId) return;
    const anchor = getCalculatedAnchor(sess);

    if(sess.customBase){
       drawToBoth(L.circleMarker([sess.customBase.lat,sess.customBase.lng],{color:"#c084fc", fillColor:"#c084fc", fillOpacity:0.6, radius:8, weight:2}).bindPopup("⚓ Static System Baseline Anchor"));
    }
    sess.baits.forEach((b, index)=>{
       let baitMarker = L.circleMarker([b.lat,b.lng],{color:"#ff00ff", fillColor:"#ff00ff", fillOpacity:0.4, radius:6, weight:2});
       baitMarker.bindPopup(`<div>🎯 <b>Bait Matrix Node:</b> ${b.desc}<br>📏 Range: ${b.distance}m<br><button class="remove-btn" style="margin-top:8px; width:100%;" onclick="removeItem('baits', '${sess.id}', ${index})">Purge Data</button></div>`);
       drawToBoth(baitMarker);
       if(anchor) drawToBoth(L.polyline([anchor, [b.lat, b.lng]], {color:"#ff00ff", dashArray:"4,6", weight: 1.5}));
    });
    sess.casts.forEach((c, index)=>{
       let castMarker = L.circleMarker([c.lat,c.lng],{color:"#f87171", fillColor:"#f87171", fillOpacity:0.6, radius:5, weight:2});
       castMarker.bindPopup(`<div>🚀 <b>Strike Vector Cast:</b> ${c.desc}<br>📏 Range: ${c.distance}m<br><button class="remove-btn" style="margin-top:8px; width:100%;" onclick="removeItem('casts', '${sess.id}', ${index})">Purge Data</button></div>`);
       drawToBoth(castMarker);
       if(anchor) drawToBoth(L.polyline([anchor, [c.lat, c.lng]], {color:"#f87171", weight: 2}));
    });
 });
}

function removeItem(type, sessionId, index) {
  const sess = db.sessions.find(x => x.id === sessionId);
  if(sess && sess[type]) {
     sess[type].splice(index, 1);
     persist(); redraw(); render();
  }
}

function previewSession(sessionId) {
  if(previewSessionId === sessionId) { previewSessionId = null; } 
  else {
     previewSessionId = sessionId;
     const sess = db.sessions.find(x => x.id === sessionId);
     if(sess) {
        let targetLatLng = null;
        if(sess.customBase) targetLatLng = [sess.customBase.lat, sess.customBase.lng];
        else {
           const spotObj = db.spots.find(x => x.id === sess.spotId);
           if(spotObj) targetLatLng = [spotObj.lat, spotObj.lng];
        }
        if(targetLatLng) map.setView(targetLatLng, 16);
     }
  }
  redraw(); render();
}

function getFormattedDate(d) {
  return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
}

function render(){
 const a=activeSession();
 document.getElementById("active").innerHTML = a ? `
 <div class="card" style="border-color: rgba(52, 211, 153, 0.3); background: rgba(16, 185, 129, 0.06);">
 <div style="display:flex; justify-content:space-between; align-items:center;">
   <b style="color:var(--accent-green); font-size:1rem; letter-spacing:0.5px;">LIVE CAPTURE MOD: ${a.name}</b>
   <span style="font-size:0.65rem; background: rgba(52,211,153,0.2); padding:3px 8px; border-radius:6px; color:var(--accent-green); font-weight:900; letter-spacing:1px;">ACTIVE</span>
 </div>
 <div style="margin: 8px 0 14px 0; font-size:0.8rem; color:var(--text-muted); line-height:1.4;">
   Swim Point: <span style="color:#fff; font-weight:600;">${a.spotName}</span> | Deployment: ${a.startDate || ''} @ ${a.startTime || ''}<br>
   Tracking Array: <span style="color:var(--accent-blue); font-weight:600;">${a.customBase ? '⚓ Static Fixed Base' : '📱 GPS Cellular Base'}</span>
 </div>
 
 <div class="metrics-row">
    <div class="metric-box"><div class="metric-val" style="color:var(--accent-blue);">${a.fish.length}</div><div class="metric-lbl">Catches</div></div>
    <div class="metric-box"><div class="metric-val" style="color:var(--accent-purple);">${a.baits.length}</div><div class="metric-lbl">Baits</div></div>
    <div class="metric-box"><div class="metric-val" style="color:var(--accent-red);">${a.casts.length}</div><div class="metric-lbl">Casts</div></div>
 </div>

 <div class="action-grid">
   <button onclick="startBase()">⚓ Set Anchor</button>
   <button class="primary" onclick="openFish()">🐟 Log Catch</button>
   <button onclick="startBait()" style="border-color:rgba(251,146,60,0.3); color:var(--accent-orange);">🎯 Add Bait</button>
   <button onclick="startCast()" style="border-color:rgba(248,113,113,0.3); color:var(--accent-red);">🚀 Log Cast</button>
 </div>
 <button class="danger" onclick="endSession()" style="width:100%; margin-top:12px; font-weight:800; border-radius:14px; padding:12px;">Terminate Logging Array</button>
 </div>` : `<div class="card" style="text-align:center; color: var(--text-muted); font-size:0.85rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:20px 0;">No Active Stream Detected.</div>`;

 let h="";
 [...db.sessions].reverse().forEach(s=>{
   let statusText = s.status === "active" ? `<span style="color:var(--accent-green); font-weight:800; font-size:0.75rem;">• RUNNING</span>` : `<span style="color:var(--text-muted); font-size:0.75rem;">🏁 ENDED ${s.endDate || ''}</span>`;
   let isPreviewing = previewSessionId === s.id;
   
   h+=`<div class="card" style="${isPreviewing ? 'border-color: var(--accent-orange);' : ''}">
   <div style="display:flex; justify-content:space-between; align-items:center;"><b style="font-size:0.95rem;">${s.name}</b> <span>${statusText}</span></div>
   <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">Operational Bounds: ${s.spotName} | Init: ${s.startDate || 'N/A'}</div>`;
   
   h+=`<button class="preview-btn ${isPreviewing?'active':''}" onclick="previewSession('${s.id}')">${isPreviewing ? '🔒 Secure Matrix Overlay' : '👁️ Projection Mapping Overlay'}</button>`;

   if(s.fish && s.fish.length > 0){
      h+=`<div style="margin-top:14px; font-size:0.7rem; font-weight:800; letter-spacing:0.5px; text-transform:uppercase; color:var(--text-muted)">Harvest Log Metrics (${s.fish.length}):</div>`;
      s.fish.forEach(f=>{
          h+=`<div class="fish-badge">
                <div class="fish-info">
                   <b>${f.species}</b>
                   <span>⚖️ ${f.weight}kg  |  📏 ${f.length}cm  |  ⚙️ ${f.bait}</span>
                </div>
                <div style="font-size:0.7rem; color:var(--text-muted); font-weight:700; font-variant-numeric:tabular-nums;">${f.time}</div>
              </div>`;
      });
   }
   h+="</div>";
 });
 document.getElementById("history").innerHTML=h;
}

function openSession(){
 if(!db.spots.length) return alert("Core initialization failure: Configured Swim point required inside database prior to run.");
 const spotSelect = document.getElementById("spotSelect");
 spotSelect.innerHTML="";
 db.spots.forEach(s=>spotSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`);
 showModal("sessionModal");
}

function createSession(){
 const spotSelect = document.getElementById("spotSelect");
 const sessionName = document.getElementById("sessionName");
 const sp=db.spots.find(x=>x.id===spotSelect.value);
 if(!sp) return;
 
 const dateObj = new Date();
 const nowTime = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
 const nowDate = getFormattedDate(dateObj);

 db.sessions.push({
   id:crypto.randomUUID(),
   name:sessionName.value||"TACTICAL-SESS-"+(db.sessions.length+1),
   spotName:sp.name,
   spotId:sp.id,
   status:"active",
   startDate: nowDate,
   startTime: nowTime,
   endDate: null,
   endTime: null,
   customBase:null,
   fish:[],
   baits:[],
   casts:[]
 });
 closeModal("sessionModal");
 sessionName.value = "";
 previewSessionId = null; 
 persist(); redraw(); render();
}

function openFish(){ showModal("fishModal"); }
function saveFish(){
 const s=activeSession();
 if(!s) return;
 const species = document.getElementById("species");
 const weight = document.getElementById("weight");
 const length = document.getElementById("length");
 const bait = document.getElementById("bait");
 const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

 s.fish.push({
   species:species.value||"Specimen",
   weight:weight.value||"0",
   length:length.value||"0",
   bait:bait.value||"Standard Strategy",
   time: now
 });
 closeModal("fishModal");
 species.value=weight.value=length.value=bait.value="";
 persist(); redraw(); render();
}

let mode=null, distance=0;
function beginSpot(){ mode="spot"; openPlace(); }
function startBase(){ mode="base"; openPlace(); }

function checkAndLockAutoBase(session) {
    if (!session.customBase && myPos) {
        session.customBase = { lat: myPos[0], lng: myPos[1] };
    }
}

function startBait(){ 
    const s=activeSession(); 
    if(!s) return; 
    checkAndLockAutoBase(s);
    mode="bait"; 
    openPlace(); 
}

function startCast(){ 
    const s=activeSession(); 
    if(!s) return; 
    checkAndLockAutoBase(s);
    mode="cast"; 
    openPlace(); 
}

function openPlace(){
 document.getElementById("placeMode").classList.add("open");
 if(!placeMap){
   placeMap=L.map('placeMap', { zoomControl: false }).setView(map.getCenter(),map.getZoom());
   L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(placeMap);
   placeMap.on('move',updateHud);
 } else {
   placeMap.setView(map.getCenter(),map.getZoom());
 }
 setTimeout(()=>{ placeMap.invalidateSize(); redraw(); },200);
}

function updateHud(){
 const hudText = document.getElementById("hudText");
 if(mode==="spot") hudText.innerText="Align telemetry sight crosshairs over deployment swim target coordinates";
 else if(mode==="base") hudText.innerText="Align sight over digital alternative reference system base coordinates";
 else{
   const c=placeMap.getCenter();
   const anchor = getCalculatedAnchor(activeSession());
   if (anchor) {
      distance=Math.round(placeMap.distance(anchor,[c.lat,c.lng]));
      hudText.innerText = "Target Sight Vector Matrix Offset Range: " + distance + "m";
   } else {
      hudText.innerText="Acquiring system position coordinates...";
   }
 }
}

function cancelPlace(){ document.getElementById("placeMode").classList.remove("open"); }

function acceptPlace() {
 const textTitle = document.getElementById("textTitle");
 const textInput = document.getElementById("textInput");
 const c=placeMap.getCenter();

 if(mode==="spot"){
    textTitle.innerText="Swim Point Identifier";
    textInput.value="";
    showModal("textModal");
    return;
 }
 if(mode==="base"){
    const s = activeSession();
    if(s) s.customBase={lat:c.lat,lng:c.lng};
    persist(); redraw(); render(); cancelPlace();
    return;
 }
 textTitle.innerText = mode==="bait" ? "Bait Allocation Metadata" : "Cast Flight Path Description";
 textInput.value="";
 showModal("textModal");
}

function finishPlacement(){
 const c=placeMap.getCenter();
 const s=activeSession();
 const textInput = document.getElementById("textInput");

 if(mode==="spot"){
    db.spots.push({id:crypto.randomUUID(),name:textInput.value||"Location Node",lat:c.lat,lng:c.lng});
    persist(); redraw();
 }
 if(mode==="bait" && s){
    s.baits.push({lat:c.lat,lng:c.lng,distance:distance,desc:textInput.value||"Target Bait Array"});
    persist(); redraw(); render();
 }
 if(mode==="cast" && s){
    s.casts.push({lat:c.lat,lng:c.lng,distance:distance,desc:textInput.value||"Vector Path Cast"});
    persist(); redraw(); render();
 }
 closeModal("textModal");
 cancelPlace();
}

function endSession(){ if(activeSession()) showModal("confirmEndModal"); }

function confirmEndSession() {
 const s=activeSession();
 if(!s) return;
 
 const dateObj = new Date();
 s.status="completed";
 s.endTime = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
 s.endDate = getFormattedDate(dateObj);
 
 closeModal("confirmEndModal");
 persist(); redraw(); render();
}

redraw(); render();
</script>
</body>
</html>
