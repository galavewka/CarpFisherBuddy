
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CarpFisher IQ - Tactical Console</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<style>
:root {
    --bg-main: #030712;
    --bg-glass: rgba(10, 17, 32, 0.7);
    --bg-glass-heavy: rgba(7, 11, 22, 0.95);
    --accent-blue: #00f0ff;
    --accent-green: #00ff87;
    --accent-orange: #ff8800;
    --accent-red: #ff3366;
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    --border-glass: rgba(255, 255, 255, 0.07);
    --border-glow: rgba(0, 240, 255, 0.25);
    --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, Helvetica, sans-serif;
}

body {
    margin: 0;
    font-family: var(--font-stack);
    background: var(--bg-main);
    color: var(--text-main);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Premium Ultra-Glass Frame */
.glass-panel {
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid var(--border-glass);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.05);
}

header {
    background: rgba(4, 7, 14, 0.9);
    backdrop-filter: blur(20px);
    padding: 10px 16px;
    text-align: center;
    font-weight: 900;
    letter-spacing: 4px;
    font-size: 1.1rem;
    border-bottom: 1px solid rgba(0, 240, 255, 0.3);
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 10px rgba(0,240,255,0.5);
    flex-shrink: 0;
}

/* Base Primary Map Control Grid Height */
#map {
    height: 38vh;
    width: 100%;
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border-glass);
    flex-shrink: 0;
}

/* Fixed Dashboard Layout Control Module Grid */
.toolbar {
    margin: 8px 12px;
    padding: 8px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
}

.tool-row {
    display: flex;
    gap: 8px;
    width: 100%;
}

/* Core System Button Styling Matrix */
button {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    background: rgba(0, 240, 255, 0.1);
    color: #fff;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
button:hover {
    background: rgba(0, 240, 255, 0.2);
    border-color: var(--accent-blue);
    box-shadow: 0 0 14px rgba(0, 240, 255, 0.3);
}
button:active { transform: scale(0.96); }

button.success { background: rgba(0, 255, 135, 0.1); border-color: rgba(0,255,135,0.2); }
button.success:hover { background: rgba(0, 255, 135, 0.25); border-color: var(--accent-green); box-shadow: 0 0 14px rgba(0, 255, 135, 0.3); }

button.secondary { background: rgba(156, 163, 175, 0.1); border-color: rgba(156, 163, 175, 0.2); color: var(--text-muted); }
button.secondary:hover { background: rgba(156, 163, 175, 0.25); border-color: #fff; color: #fff; }

button.danger { background: rgba(255, 51, 102, 0.1); border-color: rgba(255,51,102,0.2); }
button.danger:hover { background: rgba(255, 51, 102, 0.25); border-color: var(--accent-red); box-shadow: 0 0 14px rgba(255, 51, 102, 0.3); }

button.warning { background: rgba(255, 136, 0, 0.1); border-color: rgba(255,136,0,0.2); }
button.warning:hover { background: rgba(255, 136, 0, 0.25); border-color: var(--accent-orange); box-shadow: 0 0 14px rgba(255, 136, 0, 0.3); }

/* Horizontal Embedded Map Engine Switch Matrix */
.map-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    background: rgba(0,0,0,0.4);
    padding: 3px;
    border-radius: 8px;
    border: 1px solid var(--border-glass);
}
.map-btn {
    font-size: 0.65rem;
    padding: 6px 2px;
    background: transparent;
    border: 1px solid transparent;
    opacity: 0.4;
    border-radius: 6px;
}
.map-btn.active {
    background: rgba(0, 240, 255, 0.12);
    border: 1px solid rgba(0, 240, 255, 0.3);
    opacity: 1;
    color: var(--accent-blue);
    text-shadow: 0 0 8px rgba(0,240,255,0.4);
}

/* Master Core Active Workspace Container */
#active {
    flex-shrink: 0;
}

/* Dynamic Active Telemetry Workspace Layout Card */
.active-session-card {
    border: 1px solid rgba(0, 255, 135, 0.25);
    box-shadow: 0 0 20px rgba(0, 255, 135, 0.08);
    margin: 4px 12px;
    padding: 10px;
    border-radius: 12px;
}

/* Scrolling Component Engine for Archive Modules */
.scroll-container {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px 12px;
    margin-top: 4px;
}

/* Card Module Structural Foundations */
.card {
    padding: 12px;
    border-radius: 12px;
}
.card h3 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 0.8rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-glass);
    padding-bottom: 6px;
}

/* Zero-Scroll Enforcement Modification rule under Live Tracking Deployments */
body.session-active .scroll-container {
    display: none !important; /* Completely hides logs to lock UI into single viewport screen frame */
}
body.session-active #map {
    height: 42vh; /* Scales layout framework seamlessly across mobile hardware arrays */
}

/* Data Metric Blocks Grid */
.metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin: 8px 0;
}
.metric-box {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-glass);
    padding: 6px 2px;
    border-radius: 8px;
    text-align: center;
}
.metric-val {
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--accent-blue);
    text-shadow: 0 0 8px rgba(0,240,255,0.3);
}
.metric-lbl {
    font-size: 0.6rem;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 1px;
}

.action-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
}
.action-grid button {
    padding: 8px 10px;
    font-size: 0.75rem;
}

/* Overlay Windows Modals */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(2, 4, 8, 0.85);
    align-items: center;
    justify-content: center;
    z-index: 20000;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 16px;
}
.modal.open { display: flex; }

.box {
    background: var(--bg-glass-heavy);
    border: 1px solid rgba(0, 240, 255, 0.25);
    box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 30px rgba(0,240,255,0.1);
    padding: 20px;
    border-radius: 16px;
    width: 100%;
    max-width: 340px;
    box-sizing: border-box;
}
.box h3 {
    margin-top: 0;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    color: #fff;
}

input, select {
    width: 100%;
    padding: 10px 12px;
    margin: 6px 0 12px 0;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.5);
    color: var(--text-main);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    font-size: 0.9rem;
    transition: all 0.2s ease;
}
input:focus, select:focus {
    outline: none;
    border-color: var(--accent-blue);
    box-shadow: 0 0 10px rgba(0,240,255,0.25);
}

/* Full-Screen Positioning Tactical Reticle System Overlay */
#placeMode {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 30000;
    background: var(--bg-main);
}
#placeMode.open { display: block; }
#placeMap { height: 100vh; width: 100vw; position: absolute; inset: 0; z-index: 1; }
#cross {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: var(--accent-blue);
    pointer-events: none;
    z-index: 1000;
    text-shadow: 0 0 10px rgba(0,240,255,0.8);
}
#hud {
    position: absolute;
    top: calc(12px + env(safe-area-inset-top)); left: 12px; right: 12px;
    background: rgba(5, 9, 18, 0.9);
    backdrop-filter: blur(10px);
    padding: 10px;
    z-index: 1000;
    border-radius: 10px;
    border: 1px solid rgba(0, 240, 255, 0.3);
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.5px;
}
#placeBtns {
    position: absolute;
    bottom: calc(16px + env(safe-area-inset-bottom)); left: 16px; right: 16px;
    display: flex; gap: 12px; z-index: 1000;
}

/* Hyper-Saturated Tactical HUD Control Mode Variants */
#placeBtns button.danger {
    background: rgba(255, 0, 85, 0.85) !important;
    border-color: #ff0055 !important;
    box-shadow: 0 4px 20px rgba(255,0,85,0.4) !important;
    font-weight: 900;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
#placeBtns button.success {
    background: rgba(0, 255, 100, 0.85) !important;
    border-color: #00ff64 !important;
    box-shadow: 0 4px 20px rgba(0,255,100,0.4) !important;
    font-weight: 900;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}

/* Log Matrix Elements */
.fish-badge {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    margin: 6px 0;
    font-size: 0.8rem;
    border: 1px solid var(--border-glass);
    border-left: 4px solid var(--accent-blue);
}
.remove-btn {
    background: rgba(255, 51, 102, 0.08);
    color: #ffa1b5;
    padding: 5px;
    font-size: 0.65rem;
    margin-top: 6px;
    border-radius: 5px;
    width: 100%;
    border: 1px solid rgba(255, 51, 102, 0.2);
}
.remove-btn:hover { background: var(--accent-red); color: #fff; }

.preview-btn {
    background: transparent;
    color: var(--accent-blue);
    border: 1px solid rgba(0, 240, 255, 0.25);
    padding: 6px 10px;
    margin-top: 8px;
    border-radius: 6px;
    font-size: 0.7rem;
    width: auto;
}
.preview-btn.active {
    background: var(--accent-orange);
    color: #fff;
    border-color: var(--accent-orange);
}

.live-indicator {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.65rem;
    background: rgba(0,255,135,0.12);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent-green);
    font-weight: 900;
}
.live-dot {
    width: 6px; height: 6px;
    background-color: var(--accent-green);
    border-radius: 50%;
    animation: blink 1s infinite cubic-bezier(0.4, 0, 0.6, 1);
}
@keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

.leaflet-control-container { display: none !important; }
</style>
</head>
<body>

<header>CarpFisher IQ</header>

<div id="map"></div>

<div class="toolbar glass-panel">
    <div class="tool-row">
        <button onclick="beginSpot()">📍 Add Swim</button>
        <button onclick="openSession()" class="success">🎣 New Session</button>
    </div>
    <div class="map-selector">
        <button id="btn-topo" class="map-btn active" onclick="switchBaseLayer('topo')">Topo</button>
        <button id="btn-sat" class="map-btn" onclick="switchBaseLayer('sat')">Sat</button>
        <button id="btn-cyber" class="map-btn" onclick="switchBaseLayer('cyber')">Cyber</button>
        <button id="btn-comic" class="map-btn" onclick="switchBaseLayer('comic')">Comic</button>
    </div>
</div>

<div id="active"></div>

<div class="scroll-container">
    <div class="card glass-panel">
        <h3>Data Log & Session History</h3>
        <div id="history"></div>
    </div>
</div>

<div class="modal" id="sessionModal"><div class="box">
    <h3>Initialize New Session</h3>
    <input id="sessionName" placeholder="Session Identifier Name">
    <select id="spotSelect"></select>
    <button onclick="createSession()" class="success" style="width: 100%;">Start Session</button>
    <button class="secondary" onclick="closeModal('sessionModal')" style="margin-top:6px; width: 100%;">Abort</button>
</div></div>

<div class="modal" id="fishModal"><div class="box">
    <h3>Log Specimen Catch</h3>
    <input id="species" placeholder="Fish Species">
    <input id="weight" placeholder="Weight (kg)">
    <input id="length" placeholder="Length (cm)">
    <input id="bait" placeholder="Rig / Bait details">
    <button onclick="saveFish()" style="width: 100%;">Record Entry</button>
    <button class="secondary" onclick="closeModal('fishModal')" style="margin-top:6px; width: 100%;">Cancel</button>
</div></div>

<div class="modal" id="textModal"><div class="box">
    <h3 id="textTitle">Metadata Prompt</h3>
    <input id="textInput">
    <button onclick="finishPlacement()" style="width: 100%;">Save Coordinates</button>
    <button class="secondary" onclick="closeTextModal()" style="margin-top:6px; width: 100%;">Cancel</button>
</div></div>

<div class="modal" id="confirmEndModal"><div class="box" style="border-color: var(--accent-red);">
    <h3>Finish Session?</h3>
    <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; line-height: 1.4; text-align: center;">
        Are you sure you want to shut down telemetry logs and archive this active angling session?
    </p>
    <div style="display: flex; gap: 10px;">
        <button class="secondary" onclick="closeModal('confirmEndModal')">NO</button>
        <button class="danger" onclick="confirmEndSession()">YES</button>
    </div>
</div></div>

<div id="placeMode">
    <div id="placeMap"></div>
    <div id="cross">✛</div>
    <div id="hud"><span id="hudText">Calibrating Positioning Radar...</span></div>
    <div id="placeBtns">
        <button class="danger" onclick="cancelPlace()">Cancel</button>
        <button onclick="acceptPlace()" class="success">Confirm Location</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let db=JSON.parse(localStorage.getItem("fishbuddy_rebuild")||'{"spots":[],"sessions":[]}');
const persist=()=>localStorage.setItem("fishbuddy_rebuild",JSON.stringify(db));

const providers = {
    topo: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
    sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
    cyber: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
    comic: L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg')
};

const map=L.map('map', { zoomControl: false, layers: [providers.topo] }).setView([50.45,30.52],12);

let currentEngine = 'topo';
function switchBaseLayer(key) {
    Object.keys(providers).forEach(k => map.removeLayer(providers[k]));
    providers[key].addTo(map);
    currentEngine = key;
    
    document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-${key}`).classList.add('active');
}

let me=null, placeMap=null, myPos=null, previewSessionId=null;
navigator.geolocation.watchPosition(p=>{
 myPos=[p.coords.latitude,p.coords.longitude];
 const icon=L.divIcon({html:"🔷",className:""});
 
 if(!me){ me=L.marker(myPos,{icon}).addTo(map); map.setView(myPos,14); }
 else me.setLatLng(myPos);

 redraw();
}, err=>console.log("GPS Array unavailable."));

function activeSession(){ return db.sessions.find(x=>x.status==="active"); }
function getCalculatedAnchor(sess) {
   if (sess && sess.customBase) return [sess.customBase.lat, sess.customBase.lng];
   return myPos;
}

function showModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeTextModal() { closeModal('textModal'); cancelPlace(); }

let layers=[];
let placeLayers=[];

function redraw(){
 layers.forEach(x=>map.removeLayer(x)); layers=[];
 placeLayers.forEach(x=>{ if(placeMap) placeMap.removeLayer(x); }); placeLayers=[];

 const drawToBoth = (element) => {
    layers.push(element.addTo(map));
    if(placeMap) {
       let clone;
       if(element instanceof L.Marker) {
          clone = L.marker(element.getLatLng(), {icon: element.options.icon});
          if(element.getPopup()) clone.bindPopup(element.getPopup().getContent());
       } else if(element instanceof L.CircleMarker) {
          clone = L.circleMarker(element.getLatLng(), element.options);
          if(element.getPopup()) clone.bindPopup(element.getPopup().getContent());
       } else if(element instanceof L.Polyline) {
          clone = L.polyline(element.getLatLngs(), element.options);
       }
       if(clone) placeLayers.push(clone.addTo(placeMap));
    }
 };

 db.spots.forEach(s=>{
    drawToBoth(L.marker([s.lat,s.lng]).bindPopup("📍 "+s.name));
 });

 db.sessions.forEach(sess=>{
    if(sess.status !== "active" && sess.id !== previewSessionId) return;
    const anchor = getCalculatedAnchor(sess);

    if(sess.customBase){
       drawToBoth(L.circleMarker([sess.customBase.lat,sess.customBase.lng],{color:"#a855f7", fillColor:"#c084fc", fillOpacity:0.8, radius:9}).bindPopup("⚓ Manual Base Anchor point"));
    }
    sess.baits.forEach((b, index)=>{
       let baitMarker = L.circleMarker([b.lat,b.lng],{color:"#ff00ff", radius:6});
       let popupContent = `<div>🎯 ${b.desc}<br>${b.distance}m from base<br><button class="remove-btn" onclick="removeItem('baits', '${sess.id}', ${index})">Purge Object</button></div>`;
       baitMarker.bindPopup(popupContent);
       drawToBoth(baitMarker);
       if(anchor) drawToBoth(L.polyline([anchor, [b.lat, b.lng]], {color:"#ff00ff", dashArray:"6,6", weight: 2}));
    });
    sess.casts.forEach((c, index)=>{
       let castMarker = L.circleMarker([c.lat,c.lng],{color:"#ef4444", fillColor:"#ef4444", fillOpacity: 0.8, radius:5});
       let popupContent = `<div>🚀 ${c.desc}<br>${c.distance}m from base<br><button class="remove-btn" onclick="removeItem('casts', '${sess.id}', ${index})">Purge Object</button></div>`;
       castMarker.bindPopup(popupContent);
       drawToBoth(castMarker);
       if(anchor) drawToBoth(L.polyline([anchor, [c.lat, c.lng]], {color:"#ef4444", weight: 2}));
    });
 });
}

function removeItem(type, sessionId, index) {
  const sess = db.sessions.find(x => x.id === sessionId);
  if(sess && sess[type]) {
     sess[type].splice(index, 1);
     persist(); redraw(); render();
  }
}

function previewSession(sessionId) {
  if(previewSessionId === sessionId) { previewSessionId = null; } 
  else {
     previewSessionId = sessionId;
     const sess = db.sessions.find(x => x.id === sessionId);
     if(sess) {
        let targetLatLng = null;
        if(sess.customBase) targetLatLng = [sess.customBase.lat, sess.customBase.lng];
        else {
           const spotObj = db.spots.find(x => x.id === sess.spotId);
           if(spotObj) targetLatLng = [spotObj.lat, spotObj.lng];
        }
        if(targetLatLng) map.setView(targetLatLng, 16);
     }
  }
  redraw(); render();
}

function getFormattedDate(d) {
  return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
}

function render(){
 const a=activeSession();
 
 if(a) {
     document.body.classList.add("session-active");
 } else {
     document.body.classList.remove("session-active");
 }

 document.getElementById("active").innerHTML = a ? `
 <div class="glass-panel active-session-card">
 <div style="display:flex; justify-content:space-between; align-items:center;">
   <b style="color:var(--accent-green); font-size:0.85rem;">CONSOLE: ${a.name}</b>
   <span class="live-indicator"><span class="live-dot"></span>LIVE</span>
 </div>
 <div style="margin-top:4px; font-size:0.75rem; color:var(--text-muted);">
   Swim: <b>${a.spotName}</b> | Array: ${a.customBase ? 'Anchor Base' : 'GPS Mobile'}
 </div>
 
 <div class="metrics-row">
    <div class="metric-box"><div class="metric-val">${a.fish.length}</div><div class="metric-lbl">Catches</div></div>
    <div class="metric-box"><div class="metric-val">${a.baits.length}</div><div class="metric-lbl">Baits Set</div></div>
    <div class="metric-box"><div class="metric-val">${a.casts.length}</div><div class="metric-lbl">Casts Run</div></div>
 </div>

 <div class="action-grid">
   <button onclick="startBase()">⚓ Anchor</button>
   <button onclick="openFish()" style="background:rgba(0, 240, 255, 0.15); border-color:var(--accent-blue);">🐟 Log Catch</button>
   <button onclick="startBait()" class="warning">🎯 Add Bait</button>
   <button onclick="startCast()" class="danger">🚀 Log Cast</button>
 </div>
 <button class="danger" onclick="endSession()" style="width:100%; margin-top:8px; font-weight:800; padding: 8px;">Terminate Run</button>
 </div>` : `<div class="card glass-panel" style="text-align:center; color: var(--text-muted); font-size:0.8rem; margin: 4px 12px;">No Active Deployments Detected.</div>`;

 let h="";
 [...db.sessions].reverse().forEach(s=>{
   let statusText = s.status === "active" ? `<span style="color:var(--accent-green)">● ONLINE</span>` : `🏁 ARCHIVED`;
   let isPreviewing = previewSessionId === s.id;
   
   h+=`<div class="fish-badge" style="${isPreviewing ? 'border-color: var(--accent-orange); background: rgba(0,0,0,0.4);' : ''}">
   <div style="display:flex; justify-content:space-between; font-size:0.8rem;"><b>${s.name}</b> <span>${statusText}</span></div>
   <div style="font-size:0.7rem; color:var(--text-muted); margin-top:2px;">Swim: ${s.spotName} | Init: ${s.startDate || 'N/A'}</div>`;
   
   h+=`<button class="preview-btn ${isPreviewing?'active':''}" onclick="previewSession('${s.id}')">${isPreviewing ? '🔒 Close Matrix' : '👁️ View Matrix'}</button>`;

   if(s.fish && s.fish.length > 0){
      h+=`<div style="margin-top:8px; font-size:0.65rem; font-weight:bold; text-transform:uppercase; color:var(--text-muted)">Catch Log Matrix:</div>`;
      s.fish.forEach(f=>{
          h+=`<div style="background:rgba(0,0,0,0.3); padding:6px; border-radius:6px; margin-top:4px; font-size:0.75rem; border: 1px solid var(--border-glass);">
                🐟 <b>${f.species}</b> — ⚖️ ${f.weight}kg | 📏 ${f.length}cm<br>
                <span style="color:var(--accent-blue); font-size:0.65rem;">Tactical Setup: ${f.bait||'Unspecified'}</span>
              </div>`;
      });
   }
   h+="</div>";
 });
 document.getElementById("history").innerHTML=h;
 
 setTimeout(() => { map.invalidateSize(); }, 50);
}

function openSession(){
 if(!db.spots.length) return alert("System requires configured Swim location vectors before layout deployment.");
 const spotSelect = document.getElementById("spotSelect");
 spotSelect.innerHTML="";
 db.spots.forEach(s=>spotSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`);
 showModal("sessionModal");
}

function createSession(){
 const spotSelect = document.getElementById("spotSelect");
 const sessionName = document.getElementById("sessionName");
 const sp=db.spots.find(x=>x.id===spotSelect.value);
 if(!sp) return;
 
 const dateObj = new Date();
 const nowTime = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
 const nowDate = getFormattedDate(dateObj);

 db.sessions.push({
   id:crypto.randomUUID(),
   name:sessionName.value||"RUN-"+(db.sessions.length+1),
   spotName:sp.name,
   spotId:sp.id,
   status:"active",
   startDate: nowDate,
   startTime: nowTime,
   endDate: null,
   endTime: null,
   customBase:null,
   fish:[],
   baits:[],
   casts:[]
 });
 closeModal("sessionModal");
 sessionName.value = "";
 previewSessionId = null; 
 persist(); redraw(); render();
}

function openFish(){ showModal("fishModal"); }
function saveFish(){
 const s=activeSession();
 if(!s) return;
 const species = document.getElementById("species");
 const weight = document.getElementById("weight");
 const length = document.getElementById("length");
 const bait = document.getElementById("bait");
 const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

 s.fish.push({
   species:species.value||"Standard Carp",
   weight:weight.value||"0",
   length:length.value||"0",
   bait:bait.value||"Standard Rig",
   time: now
 });
 closeModal("fishModal");
 species.value=weight.value=length.value=bait.value="";
 persist(); redraw(); render();
}

let mode=null, distance=0;
function beginSpot(){ mode="spot"; openPlace(); }
function startBase(){ mode="base"; openPlace(); }

function checkAndLockAutoBase(session) {
    if (!session.customBase && myPos) {
        session.customBase = { lat: myPos[0], lng: myPos[1] };
    }
}

function startBait(){ 
    const s=activeSession(); 
    if(!s) return; 
    checkAndLockAutoBase(s);
    mode="bait"; 
    openPlace(); 
}

function startCast(){ 
    const s=activeSession(); 
    if(!s) return; 
    checkAndLockAutoBase(s);
    mode="cast"; 
    openPlace(); 
}

function openPlace() {
 document.getElementById("placeMode").classList.add("open");
 if(!placeMap){
   const currentTileUrl = providers[currentEngine]._url;
   const overlayTiles = L.tileLayer(currentTileUrl);
   
   placeMap=L.map('placeMap', { zoomControl: false }).setView(map.getCenter(),map.getZoom());
   overlayTiles.addTo(placeMap);
   placeMap.on('move',updateHud);
 } else {
   placeMap.setView(map.getCenter(),map.getZoom());
 }
 setTimeout(()=>{ placeMap.invalidateSize(); updateHud(); },200);
}

function updateHud(){
 const hudText = document.getElementById("hudText");
 if(mode==="spot") hudText.innerText="Align crosshair over desired coordinates to log geographical spot";
 else if(mode==="base") hudText.innerText="Align crosshair to set alternative static array baseline anchor";
 else{
   const c=placeMap.getCenter();
   const anchor = getCalculatedAnchor(activeSession());
   if (anchor) {
      distance=Math.round(placeMap.distance(anchor,[c.lat,c.lng]));
      hudText.innerText = (activeSession()?.customBase ? "Range Matrix from Anchor: " : "Range Matrix from Mobile Unit: ") + distance + "m";
   } else {
      distance = 0;
      hudText.innerText="Calculating telemetry coordinates...";
   }
 }
}

function cancelPlace(){ document.getElementById("placeMode").classList.remove("open"); }

function acceptPlace() {
 const textTitle = document.getElementById("textTitle");
 const textInput = document.getElementById("textInput");
 const c=placeMap.getCenter();

 cancelPlace();

 if(mode==="spot"){
    textTitle.innerText="Swim Description";
    textInput.value="";
    showModal("textModal");
    return;
 }
 if(mode==="base"){
    const s = activeSession();
    if(s) s.customBase={lat:c.lat,lng:c.lng};
    persist(); redraw(); render();
    return;
 }
 textTitle.innerText = mode==="bait" ? "Bait Configuration Payload" : "Cast Flight Path Description";
 textInput.value="";
 showModal("textModal");
}

function finishPlacement(){
 const c=placeMap.getCenter();
 const s=activeSession();
 const textInput = document.getElementById("textInput");

 if(mode==="spot"){
    db.spots.push({id:crypto.randomUUID(),name:textInput.value||"Unnamed Swim",lat:c.lat,lng:c.lng});
    persist(); redraw();
 }
 if(mode==="bait" && s){
    s.baits.push({lat:c.lat,lng:c.lng,distance:distance,desc:textInput.value||"Bait Node"});
    persist(); redraw(); render();
 }
 if(mode==="cast" && s){
    s.casts.push({lat:c.lat,lng:c.lng,distance:distance,desc:textInput.value||"Strike Vector"});
    persist(); redraw(); render();
 }
 closeModal("textModal");
}

function endSession(){
 const s=activeSession();
 if(!s) return;
 showModal("confirmEndModal");
}

function confirmEndSession() {
 const s=activeSession();
 if(!s) return;
 
 const dateObj = new Date();
 s.status="completed";
 s.endTime = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
 s.endDate = getFormattedDate(dateObj);
 
 closeModal("confirmEndModal");
 persist(); redraw(); render();
}

redraw(); render();
</script>
